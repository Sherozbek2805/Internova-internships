      <div class="flex bg-white/10 rounded-xl p-1 mb-6">

          <!-- Eye icon -->

                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

          </button>
        </div>

        <div>
          <div class="w-full bg-gray-700 rounded h-2 overflow-hidden">
            <div id="strengthBar" class="h-2 rounded bg-red-500 w-0 transition-all"></div>

        </div>

        <div>
          <label for="confirmPassword" class="text-sm">Parolni takrorlang</label>
          <input id="confirmPassword"
            type="password"
            required
            autocomplete="new-password"

        </div>

        <div id="studentFields" class="space-y-4">
          <div>
            <label for="name" class="text-sm">Ism-familya</label>
            <input id="name"
              class="mt-1 w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 outline-none focus:border-blue-400">
          </div>
          <div>
            <label class="text-sm">Telefon raqam</label>

          <div>
            <label class="text-sm">Telegram username</label>

          </div>
                    <div>
            <label for="school" class="text-sm">Maktab</label>
            <input id="school"
              class="mt-1 w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 outline-none focus:border-blue-400">
          </div>
        </div>

        <div id="companyFields" class="space-y-4 hidden">
          <div>
            <label for="companyName" class="text-sm">Kompaniya nomi</label>
            <input id="companyName"
              class="mt-1 w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 outline-none focus:border-blue-400">
          </div>

            <label class="text-sm">Telefon 1</label>

        <button type="submit"
          class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-500 text-white font-medium hover:opacity-95 transition">
          Ro‘yxatdan o‘tish
        </button>
              <a
        href="{{ url_for('auth.google_login') }}"
        class="w-full flex items-center justify-center gap-2 py-3 rounded-xl bg-white text-gray-800 font-medium hover:bg-gray-100 transition"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 48 48"
          width="20"
          height="20"
        >
          <path
            fill="#FFC107"
            d="M43.6 20.5H42V20H24v8h11.3C33.7 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c10.4 0 19-7.5 19-20 0-1.3-.1-2.7-.4-3.5z"
          />
          <path
            fill="#FF3D00"
            d="M6.3 14.7l6.6 4.8C14.5 16.1 18.9 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.6 8.4 6.3 14.7z"
          />
          <path
            fill="#4CAF50"
            d="M24 44c5.2 0 10-2 13.5-5.3l-6.2-5.1C29.3 36 26.8 37 24 37c-5.2 0-9.6-3.3-11.2-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"
          />
          <path
            fill="#1976D2"
            d="M43.6 20.5H42V20H24v8h11.3c-1.1 3-3.4 5.5-6.2 7.1l6.2 5.1C38.6 37.2 44 31.2 44 24c0-1.3-.1-2.7-.4-3.5z"
          />
        </svg>

        Google orqali kirish
      </a>
      </form>

      <p class="text-center text-sm text-gray-400 mt-6">
        Akkauntingiz bormi?
        <a href="{{ url_for('auth.login') }}" class="text-blue-400 hover:underline">Kirish</a>
      </p>

<script>
const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;

// =========================
// 🔥 SAFE FALLBACK FUNCTIONS (FIX)
// =========================
function setBtnState(btn, state) {
  if (!btn) return;

  if (state === "loading") {
    btn.disabled = true;
    btn.innerText = "Loading...";
  } else if (state === "success") {
    btn.innerText = "Success ✅";
  } else if (state === "error") {
    btn.innerText = "Error ❌";
    btn.disabled = false;
  } else {
    btn.disabled = false;
    btn.innerText = "Ro‘yxatdan o‘tish";
  }
}

function toast(message, type="info") {
  console.log(type.toUpperCase() + ":", message);
  alert(message);
}

// =========================
// ELEMENTS
// =========================
const studentBtn = document.getElementById("studentBtn");
const companyBtn = document.getElementById("companyBtn");
const studentFields = document.getElementById("studentFields");
const companyFields = document.getElementById("companyFields");
const roleInput = document.getElementById("role");

const email = document.getElementById("email");
const emailStatus = document.getElementById("emailStatus");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const strengthBar = document.getElementById("strengthBar");
const strengthText = document.getElementById("strengthText");
const companyName = document.getElementById("companyName");
const signupForm = document.getElementById("signupForm");
const togglePassword = document.getElementById("togglePassword");

const phone1 = document.getElementById("phone1");
const phone2 = document.getElementById("phone2");
const address = document.getElementById("address");
const industry = document.getElementById("industry");

let emailAvailable = false;

// =========================
// ROLE SWITCH
// =========================
function setRole(role) {
  roleInput.value = role;

  if (role === "student") {
    studentFields.classList.remove("hidden");
    companyFields.classList.add("hidden");
    companyName.required = false;

    studentBtn.className = "flex-1 py-2 rounded-lg bg-gradient-to-r from-blue-500 to-purple-500 text-white text-sm font-medium";
    companyBtn.className = "flex-1 py-2 rounded-lg text-gray-400 text-sm font-medium";
  } else {
    companyFields.classList.remove("hidden");
    studentFields.classList.add("hidden");
    companyName.required = true;

    companyBtn.className = "flex-1 py-2 rounded-lg bg-gradient-to-r from-blue-500 to-purple-500 text-white text-sm font-medium";
    studentBtn.className = "flex-1 py-2 rounded-lg text-gray-400 text-sm font-medium";
  }
}

// =========================
// VALIDATION
// =========================
function isValidEmail(emailValue) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue);
}

function isStrongEnoughPassword(value) {
  return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/.test(value);
}

function isValidTelegram(username) {
  return /^@?[a-zA-Z0-9_]{5,}$/.test(username);
}

// =========================
// 🔥 CONFIRM PASSWORD LIVE CHECK (NEW)
// =========================
function checkPasswordMatch() {
  const pass = password.value.trim();
  const confirm = confirmPassword.value.trim();

  if (!confirm) {
    confirmPassword.classList.remove("input-error", "input-success");
    return;
  }

  if (pass === confirm) {
    confirmPassword.classList.add("input-success");
    confirmPassword.classList.remove("input-error");
  } else {
    confirmPassword.classList.add("input-error");
    confirmPassword.classList.remove("input-success");
  }
}

// =========================
// PASSWORD STRENGTH
// =========================
function updatePasswordStrength() {
  const val = password.value;
  let score = 0;

  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[a-z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[@$!%*?&]/.test(val)) score++;

  const percent = Math.min(score * 20, 100);
  strengthBar.style.width = percent + "%";

  if (score <= 2) {
    strengthBar.className = "h-2 rounded bg-red-500 transition-all";
    strengthText.innerText = "Zaif parol";
  } else if (score <= 4) {
    strengthBar.className = "h-2 rounded bg-yellow-500 transition-all";
    strengthText.innerText = "O‘rtacha parol";
  } else {
    strengthBar.className = "h-2 rounded bg-green-500 transition-all";
    strengthText.innerText = "Kuchli parol";
  }

  checkPasswordMatch(); // 🔥 update on typing
}

// =========================
// EMAIL CHECK (FIXED)
// =========================
async function checkEmailAvailability() {
  const emailValue = email.value.trim().toLowerCase();
  emailAvailable = false;

  if (!emailValue) return false;

  if (!isValidEmail(emailValue)) {
    emailStatus.innerText = "Email noto‘g‘ri";
    emailStatus.className = "text-sm mt-1 text-red-400";
    return false;
  }

  try {
    const res = await fetch("/check-email", {  // 🔥 FIXED
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
      },
      body: JSON.stringify({ email: emailValue })
    });

    const data = await res.json();

    if (!res.ok) return false;

    if (data.available) {
      emailStatus.innerText = "Email bo‘sh";
      emailStatus.className = "text-green-400 text-sm";
      emailAvailable = true;
      return true;
    } else {
      emailStatus.innerText = "Email band";
      emailStatus.className = "text-red-400 text-sm";
      return false;
    }

  } catch (err) {
    console.error("Email check error:", err);
    return false;
  }
}

// =========================
// PHONE VALIDATION
// =========================
function validatePhone(input, required=false) {
  if (!input) return true;

  const val = input.value.trim().replace(/\s/g, "");

  if (!val && !required) return true;

  if (!/^\+?\d{9,15}$/.test(val)) {
    return false;
  }

  return true;
}

// =========================
// EVENTS
// =========================
studentBtn.onclick = () => setRole("student");
companyBtn.onclick = () => setRole("company");

password.addEventListener("input", updatePasswordStrength);
confirmPassword.addEventListener("input", checkPasswordMatch); // 🔥 NEW

const eyeOpen = document.getElementById("eyeOpen");
const eyeClosed = document.getElementById("eyeClosed");

togglePassword.onclick = () => {
  const isHidden = password.type === "password";

  password.type = isHidden ? "text" : "password";

  eyeOpen.classList.toggle("hidden", isHidden);
  eyeClosed.classList.toggle("hidden", !isHidden);
};

email.addEventListener("blur", checkEmailAvailability);

// =========================
// MAIN SUBMIT (FINAL FIX)
// =========================
signupForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  console.log("🚀 SUBMIT TRIGGERED"); // 🔥 DEBUG

  if (signupForm.dataset.processing === "true") return;
  signupForm.dataset.processing = "true";

  const btn = signupForm.querySelector("button[type='submit']");
  setBtnState(btn, "loading");

  const emailValue = email.value.trim().toLowerCase();
  const pass = password.value.trim();
  const confirm = confirmPassword.value.trim();

  if (!isValidEmail(emailValue)) {
    toast("Email noto‘g‘ri", "error");
    setBtnState(btn, "idle");
    signupForm.dataset.processing = "false";
    return;
  }

  if (!isStrongEnoughPassword(pass)) {
    toast("Parol kuchsiz", "error");
    setBtnState(btn, "idle");
    signupForm.dataset.processing = "false";
    return;
  }

  if (pass !== confirm) {
    toast("Parollar mos emas", "error");
    setBtnState(btn, "idle");
    signupForm.dataset.processing = "false";
    return;
  }

  if (roleInput.value === "company") {
    if (!companyName.value.trim()) {
      toast("Kompaniya nomi kerak", "error");
      setBtnState(btn, "idle");
      signupForm.dataset.processing = "false";
      return;
    }

    if (!validatePhone(phone1, true)) {
      toast("Telefon noto‘g‘ri", "error");
      setBtnState(btn, "idle");
      signupForm.dataset.processing = "false";
      return;
    }
  }

  const emailCheck = await checkEmailAvailability();

  if (!emailCheck) {
    toast("Emailni tekshiring", "error");
    setBtnState(btn, "idle");
    signupForm.dataset.processing = "false";
    return;
  }

  const payload = {
    email: emailValue,
    password: pass,
    role: roleInput.value,
    name: roleInput.value === "student"
      ? document.getElementById("name").value.trim()
      : companyName.value.trim(),
    school: document.getElementById("school")?.value || "",
    phone: document.getElementById("studentPhone")?.value || "",
    telegram: document.getElementById("telegram")?.value || "",
    phone1: phone1?.value || "",
    phone2: phone2?.value || "",
    address: address?.value || "",
    industry: industry?.value || ""
  };

  try {
    const res = await fetch("/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
      },
      body: JSON.stringify(payload)
    });

    const result = await res.json();

    if (res.ok) {
      setBtnState(btn, "success");

      // REMOVE auto redirect

      document.getElementById("message").innerHTML = `
        <div class="rounded-xl bg-green-500/10 border border-green-500/30 p-4 text-green-300">

          <div class="mt-4 flex gap-2">
            <a href="/login" class="bg-white text-black px-3 py-2 rounded">
              Login sahifaga o‘tish
            </a>
          </div>
        </div>
      `;

    } else {
      toast(result.message || "Xatolik", "error");
      setBtnState(btn, "error");
    }

  } catch (err) {
    console.error("Signup error:", err);
    toast("Server xatosi", "error");
    setBtnState(btn, "error");
  }

  signupForm.dataset.processing = "false";
});

// =========================
const params = new URLSearchParams(window.location.search);
const roleFromUrl = params.get("role");

if (roleFromUrl === "company") {
  setRole("company");
} else {
  setRole("student");
}
</script>
{% endblock %}
