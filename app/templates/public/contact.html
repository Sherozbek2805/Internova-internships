<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Internova</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="text-white bg-gradient-to-br from-[#0f172a] via-[#1e1b4b] to-[#312e81]">

<section class="max-w-6xl mx-auto px-6 py-20">

  <h1 class="text-5xl font-bold mb-6">
    Get in 
    <span class="bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
      Touch
    </span>
  </h1>

  <p class="text-gray-300 mb-12 max-w-2xl">
    Have questions, feedback, or partnership ideas? We’d love to hear from you.
  </p>

  <div class="grid md:grid-cols-2 gap-10">

    <!-- Info -->
    <div class="space-y-6">

      <div class="p-6 rounded-2xl bg-white/10 border border-white/20 backdrop-blur">
        <h3 class="text-xl font-semibold mb-2">📍 Location</h3>
        <p class="text-gray-300">Tashkent, Uzbekistan</p>
      </div>

      <div class="p-6 rounded-2xl bg-white/10 border border-white/20 backdrop-blur">
        <h3 class="text-xl font-semibold mb-2">📧 Email</h3>
        <p class="text-gray-300">support@internova.uz</p>
      </div>

      <div class="p-6 rounded-2xl bg-white/10 border border-white/20 backdrop-blur">
        <h3 class="text-xl font-semibold mb-2">🤝 Partnerships</h3>
        <p class="text-gray-300">partners@internova.uz</p>
      </div>
      <div class="p-6 rounded-2xl bg-white/10 border border-white/20 backdrop-blur">
        <h3 class="text-xl font-semibold mb-2">📞 Telefon</h3>
        <p class="text-gray-300">+998 71 234 56 78</p>
      </div>

    </div>

  </div>

</section>

</body>
</html>
