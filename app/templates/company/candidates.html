{% extends "company/base.html" %} {% block content %}

<!-- ✅ CSRF TOKEN -->
<meta name="csrf-token" content="{{ csrf_token() }}" />

<section class="space-y-10">
  <div>
    <h1 class="text-4xl font-bold text-white">Candidates</h1>
  </div>

  <!-- 📊 STATS -->
  <div class="grid md:grid-cols-4 gap-4">
    <div class="stat-card">
      <p>Total</p>
      <h2 id="stat-total">0</h2>
    </div>
    <div class="stat-card">
      <p>Reviewing</p>
      <h2 id="stat-reviewing">0</h2>
    </div>
    <div class="stat-card">
      <p>Shortlisted</p>
      <h2 id="stat-shortlisted">0</h2>
    </div>
    <div class="stat-card">
      <p>Selected</p>
      <h2 id="stat-selected">0</h2>
    </div>
  </div>

  <!-- 🔍 FILTERS -->
  <div class="grid md:grid-cols-5 gap-4">
    <input id="searchInput" placeholder="Search..." class="filter-input" />

    <select id="internshipFilter" class="filter-input">
      <option value="all">All Internships</option>
    </select>

    <select id="statusFilter" class="filter-input">
      <option value="all">All Status</option>
      <option>Yangi</option>
      <option>Ko'rib chiqilmoqda</option>
      <option>Qisqa ro'yxat</option>
      <option>Saralangan</option>
    </select>

    <input
      type="number"
      id="scoreFilter"
      placeholder="Min Score"
      class="filter-input"
    />

    <select id="sortFilter" class="filter-input">
      <option value="default">Sort</option>
      <option value="score-desc">Score ↓</option>
      <option value="score-asc">Score ↑</option>
    </select>
  </div>

  <!-- 👥 CARDS -->
  <div id="candidatesContainer" class="grid lg:grid-cols-2 gap-6"></div>
</section>

<style>
  .stat-card {
    background: rgba(255, 255, 255, 0.06);
    padding: 20px;
    border-radius: 16px;
  }
  .filter-input {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 10px;
    border-radius: 10px;
    color: white;
  }
  .candidate-card {
    background: rgba(255, 255, 255, 0.04);
    padding: 20px;
    border-radius: 16px;
  }
</style>

<script>
  const el = (id) => document.getElementById(id);

  const state = {
    search: "",
    internship: "all",
    status: "all",
    min_score: -1,
    sort: "default",
  };

  let isLoading = false;
  let searchTimeout;

  // 🔐 CSRF
  function getCSRF() {
    return document.querySelector('meta[name="csrf-token"]').content;
  }

  // 🔥 SAFE PARAM BUILDER (added)
  function buildParams() {
    const params = new URLSearchParams();

    if (state.search) params.append("search", state.search);
    if (state.internship !== "all")
      params.append("internship", state.internship);
    if (state.status !== "all") params.append("status", state.status);

    // 🔥 FORCE
    params.append("min_score", state.min_score);

    if (state.sort !== "default") params.append("sort", state.sort);

    return params;
  }

  // 🔥 STATS
  async function loadStats() {
    const res = await fetch("/company/candidates/stats");
    const data = await res.json();

    el("stat-total").innerText = data.total;
    el("stat-reviewing").innerText = data.reviewing;
    el("stat-shortlisted").innerText = data.shortlisted;
    el("stat-selected").innerText = data.selected;
  }

  // 🔥 LOAD DATA (improved but same structure)
  async function loadCandidates() {
    if (isLoading) return;
    isLoading = true;

    try {
      const params = buildParams();

      console.log("REQUEST:", Object.fromEntries(params));

      const res = await fetch(`/company/candidates?${params}`, {
        headers: { "X-Requested-With": "XMLHttpRequest" },
      });

      if (!res.ok) {
        console.error("Request failed:", res.status);
        return;
      }

      const data = await res.json();

      renderCandidates(data.applications);
      renderInternships(data.internships);

      console.log("STATE:", state);
    } catch (err) {
      console.error("Error:", err);
    } finally {
      isLoading = false;
    }
  }

  // 🔥 INTERNSHIP FILTER
  function renderInternships(list) {
    const select = el("internshipFilter");
    if (select.options.length > 1) return;

    list.forEach((i) => {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = i;
      select.appendChild(opt);
    });
  }

  // 🔥 CARDS (UNCHANGED)
  function renderCandidates(apps) {
    const container = document.getElementById("candidatesContainer");

    if (!apps.length) {
      container.innerHTML = `<p class="text-gray-400">No candidates</p>`;
      return;
    }

    container.innerHTML = apps
      .map(
        (a) => `

<div class="candidate-card relative group" data-id="${a.id}">
  <div class="absolute -inset-[1px] rounded-2xl bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500 opacity-0 blur-xl transition duration-500 group-hover:opacity-80"></div>

  <div class="relative bg-white/5 border border-white/10 backdrop-blur-xl rounded-2xl p-5 transition duration-300 
              group-hover:scale-[1.02] group-hover:border-indigo-400/40 
              ${a.score > 85 ? "ring-2 ring-indigo-400/40 shadow-[0_0_35px_rgba(99,102,241,0.5)]" : ""}">

    <div class="flex gap-4">

      <div class="w-12 h-12 flex items-center justify-center rounded-full 
                  bg-gradient-to-br from-indigo-500 to-purple-500 
                  text-white font-semibold text-lg shadow-lg shadow-indigo-500/30">
        ${a.student_name.charAt(0)}
      </div>

      <div class="flex-1">

        <div class="flex items-center justify-between">
          <h2 class="text-white font-semibold text-base tracking-wide group-hover:text-indigo-300 transition">
            ${a.student_name}
          </h2>

          <span class="${getStatusClass(a.status)} text-xs px-3 py-1 rounded-full font-medium shadow-sm">
            ${a.status}
          </span>
        </div>

        <p class="text-gray-400 text-sm mt-0.5">${a.student_email}</p>
        <p class="text-indigo-400 text-xs mt-1">${a.internship_title}</p>

        <div class="grid grid-cols-3 gap-3 mt-4">
          <input type="number" value="${a.score || 0}"
            class="score-input bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white text-sm">

          <select class="status-select bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white text-sm">
            ${["Yangi", "Ko'rib chiqilmoqda", "Qisqa ro'yxat", "Saralangan"]
              .map(
                (s) =>
                  `<option ${a.status === s ? "selected" : ""}>${s}</option>`,
              )
              .join("")}
          </select>

          <div></div>
        </div>

        <textarea class="evaluation-note w-full mt-3 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white text-sm">
          ${a.evaluation_note || ""}
        </textarea>

        <div class="flex gap-3 mt-4">
  <button class="save-btn flex-1 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-lg py-2">
    Save
  </button>

  <button class="view-btn flex-1 bg-white/10 border border-white/20 text-white rounded-lg py-2">
    Details
  </button>
</div>

      </div>
    </div>
  </div>
</div>

`,
      )
      .join("");
  }

  function getStatusClass(status) {
    return (
      {
        Yangi: "bg-blue-500/10 text-blue-400",
        "Ko'rib chiqilmoqda": "bg-yellow-500/10 text-yellow-400",
        "Qisqa ro'yxat": "bg-purple-500/10 text-purple-400",
        Saralangan: "bg-green-500/10 text-green-400",
      }[status] || "bg-gray-500/10 text-gray-400"
    );
  }

  // 🔥 FILTERS (same but fixed)
  searchInput.addEventListener("input", (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      state.search = e.target.value;
      loadCandidates();
    }, 400);
  });

  statusFilter.addEventListener("change", (e) => {
    state.status = e.target.value;
    loadCandidates();
  });

  internshipFilter.addEventListener("change", (e) => {
    state.internship = e.target.value;
    loadCandidates();
  });

  scoreFilter.addEventListener("input", (e) => {
    const val = e.target.value;
    state.min_score = val === "" ? -1 : parseInt(val); // 🔥 fallback to -1
    loadCandidates();
  });

  sortFilter.addEventListener("change", (e) => {
    state.sort = e.target.value;
    loadCandidates();
  });

  // 🔥 SAVE + VIEW (UNCHANGED)
  document.addEventListener("click", async (e) => {
    if (!e.target.classList.contains("save-btn")) return;

    const card = e.target.closest(".candidate-card");

    const data = new FormData();
    data.append("id", card.dataset.id);
    data.append("score", card.querySelector(".score-input").value);
    data.append("status", card.querySelector(".status-select").value);
    data.append("note", card.querySelector(".evaluation-note").value);

    e.target.innerText = "Saving...";

    const res = await fetch("/company/applications/update", {
      method: "POST",
      headers: { "X-CSRFToken": getCSRF() },
      body: data,
    });

    const result = await res.json();

    if (result.status === "success") {
      e.target.innerText = "Saved ✓";
      loadStats();
    } else {
      e.target.innerText = "Error";
    }

    setTimeout(() => (e.target.innerText = "Save"), 2000);
  });

  document.addEventListener("click", async (e) => {
    if (!e.target.classList.contains("view-btn")) return;

    const card = e.target.closest(".candidate-card");
    const id = card.dataset.id;

    try {
      const res = await fetch(`/company/applications/${id}`);

      const data = await res.json();

      if (!res.ok || data.error) {
        console.error("Backend error:", data.error);
        alert("Failed to load candidate");
        return;
      }

      const p = data.profile;

      document.getElementById("modalContent").innerHTML = `

<!-- HEADER -->
<div class="flex items-center gap-4">
  <div class="w-14 h-14 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white text-xl font-bold">
    ${p.name.charAt(0)}
  </div>

  <div>
    <h3 class="text-xl text-white font-semibold">${p.name}</h3>
    <p class="text-gray-400">${p.email}</p>
  </div>
</div>

<hr class="border-white/10">

<!-- 🎓 ACADEMIC -->
<div>
  <h4 class="text-indigo-400 font-medium mb-2">🎓 Academic Info</h4>
  <div class="grid grid-cols-2 gap-3">
    <p><strong>School:</strong> ${p.school || "-"}</p>
    <p><strong>Program:</strong> ${p.program || "-"}</p>
    <p><strong>Grade:</strong> ${p.grade || "-"}</p>
    <p><strong>GPA:</strong> ${p.gpa || "-"}</p>
  </div>
</div>

<hr class="border-white/10">

<!-- 📍 CONTACT -->
<div>
  <h4 class="text-indigo-400 font-medium mb-2">📍 Contact</h4>
  <div class="grid grid-cols-2 gap-3">
    <p><strong>Location:</strong> ${p.location || "-"}</p>
    <p><strong>Phone:</strong> ${p.phone || "-"}</p>
    <p><strong>Telegram:</strong> ${p.telegram || "-"}</p>
    <p><strong>GitHub:</strong> ${
      p.github
        ? `<a href="${p.github}" target="_blank" class="text-indigo-400">Open</a>`
        : "-"
    }</p>
    <p><strong>LinkedIn:</strong> ${
      p.linkedin
        ? `<a href="${p.linkedin}" target="_blank" class="text-indigo-400">Open</a>`
        : "-"
    }</p>
  </div>
</div>

<hr class="border-white/10">

<!-- 💬 MOTIVATION -->
<div>
  <h4 class="text-indigo-400 font-medium mb-2">💬 Motivation</h4>
  <p class="text-gray-400 leading-relaxed">
    ${p.motivation || "No motivation provided"}
  </p>
</div>

<hr class="border-white/10">

<!-- 🧠 SKILLS -->
<div>
  <h4 class="text-indigo-400 font-medium mb-2">🧠 Skills</h4>
  <div class="flex flex-wrap gap-2">
    ${
      data.skills.length
        ? data.skills
            .map(
              (s) => `
          <span class="px-3 py-1 bg-indigo-500/20 text-indigo-300 rounded-full text-xs">
            ${s}
          </span>
        `,
            )
            .join("")
        : "<p class='text-gray-400'>No skills listed</p>"
    }
  </div>
</div>

<hr class="border-white/10">

<!-- 💼 EXPERIENCE -->
<div>
  <h4 class="text-indigo-400 font-medium mb-3">💼 Experience</h4>
  ${
    data.experiences.length
      ? data.experiences.map(exp => {

        // 🧠 parse grade_levels safely
        let grades = "-";
        let hours = "-";
        let weeks = "-";
        let uniYears = "-";

        try {
          const gl = exp.grade_levels || {};

          grades = Array.isArray(gl.grades) ? gl.grades.join(", ") : "-";
          hours = gl.hours_per_week ?? "-";
          weeks = gl.weeks_per_year ?? "-";
          uniYears = Array.isArray(gl.university_years)
            ? gl.university_years.join(", ")
            : "-";
        } catch (e) {}

        return `
        <div class="relative border border-white/10 rounded-xl p-4 mb-4 bg-gradient-to-br from-white/5 to-white/2 hover:border-indigo-400/40 transition">

          <!-- HEADER -->
          <div class="flex items-start justify-between mb-2">
            <div>
              <p class="text-white font-semibold text-sm">${exp.title}</p>
              <p class="text-xs text-gray-400">${exp.organization}</p>
            </div>

            ${
              exp.is_current
                ? `<span class="text-[10px] px-2 py-1 bg-green-500/20 text-green-400 rounded-full">Current</span>`
                : ""
            }
          </div>

          <!-- ROLE -->
          <p class="text-xs text-indigo-300 mb-2">Role: ${exp.role || "-"}</p>

          <!-- DESCRIPTION -->
          <p class="text-xs text-gray-400 leading-relaxed mb-3">
            ${exp.description || "No description provided"}
          </p>

          <!-- DETAILS GRID -->
          <div class="grid grid-cols-2 gap-2 text-[11px] text-gray-400">
            <div>📚 Grades: <span class="text-white">${grades}</span></div>
            <div>⏱ Hours/week: <span class="text-white">${hours}</span></div>
            <div>📅 Weeks/year: <span class="text-white">${weeks}</span></div>
            <div>🎓 Uni years: <span class="text-white">${uniYears}</span></div>
          </div>

        </div>
        `;
      }).join("")
      : "<p class='text-gray-400'>No experience</p>"
  }
</div>

`;

      // ✅ CV FIX
      document.getElementById("viewCV").href = p.cv_url || "#";

      const modal = document.getElementById("candidateModal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    } catch (err) {
      console.error("ERROR:", err);
      alert("Something went wrong");
    }
  });

  document.addEventListener("click", (e) => {
    const modal = document.getElementById("candidateModal");

    if (e.target.id === "closeModal" || e.target.id === "candidateModal") {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }
  });

  // INIT
  loadStats();
  loadCandidates();
</script>

<div
  id="candidateModal"
  class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50"
>
  <div
    class="bg-[#0f172a] border border-white/10 rounded-2xl p-8 w-full max-w-4xl relative shadow-2xl"
  >
    <button
      id="closeModal"
      class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl"
    >
      ✕
    </button>

    <h2 class="text-2xl font-semibold text-white mb-6">Candidate Profile</h2>

    <div
      id="modalContent"
      class="space-y-6 text-sm text-gray-300 overflow-y-auto max-h-[75vh] pr-2"
    ></div>

    <div class="mt-6 flex gap-3">
      <a
        id="viewCV"
        href="#"
        target="_blank"
        class="flex-1 text-center bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-lg"
      >
        📄 View CV
      </a>

      <button
        id="closeModalBtn"
        class="flex-1 bg-white/10 border border-white/20 text-white py-3 rounded-lg"
      >
        Close
      </button>
    </div>
  </div>
</div>
{% endblock %}
