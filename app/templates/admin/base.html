<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Admin{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up { animation: fadeUp .7s ease forwards; }

    .card { transition: .3s; }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    .active { color: #60a5fa; }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-[#0b1020] via-[#0f1b3d] to-[#0b1020] text-gray-200">

<header class="sticky top-0 bg-white/5 border-b border-white/10">
  <div class="max-w-7xl mx-auto flex justify-between px-6 py-4">
<div class="flex items-center gap-3">

  <img src="/static/logo.png"
       alt="Internova Logo"
       class="w-8 h-8 object-contain">

  <div>
    <p class="font-semibold">Internova</p>
    <p class="text-xs text-gray-400">Admin panel</p>
  </div>

</div>

    <nav class="flex gap-6 text-sm">
      <a href="{{ url_for('admin.overview') }}" class="{% if active=='overview' %}active{% endif %}">Umumiy</a>
      <a href="{{ url_for('admin.users') }}" class="{% if active=='users' %}active{% endif %}">Users</a>
      <a href="{{ url_for('admin.companies') }}" class="{% if active=='companies' %}active{% endif %}">Companies</a>
      <a href="{{ url_for('admin.internships') }}" class="{% if active=='internships' %}active{% endif %}">Internships</a>
      <a href="{{ url_for('admin.applications') }}" class="{% if active=='applications' %}active{% endif %}">Applications</a>
    </nav>

    <form action="/logout" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="px-4 py-2 rounded-lg border border-white/10 bg-white/5 text-sm hover:bg-white/10 transition">
              Logout
            </button>
          </form>

  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-10">
  {% block content %}{% endblock %}
</main>
<script>
document.addEventListener("submit", async function(e) {
  const form = e.target;

  if (!form.hasAttribute("data-ajax")) return;
  e.preventDefault();

  const btn = form.querySelector("button");
  if (btn) {
    btn.disabled = true;
    btn.dataset.originalText = btn.innerText;
    btn.innerText = "Yuklanmoqda...";
  }

  try {
    const res = await fetch(form.action, {
      method: "POST",
      headers: {
        "X-Requested-With": "XMLHttpRequest"
      },
      body: new FormData(form)
    });

    const data = await res.json();

    if (data.success) {
      updateUI(form, data);
    }

  } catch (err) {
    console.error(err);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerText = btn.dataset.originalText;
    }
  }
});
</script>
<script>
function updateUI(form, data) {

  // =========================
  // COMPANY TOGGLE
  // =========================
  if (form.action.includes("company")) {

    const container = form.closest("div.flex.flex-col");
    if (!container) return;

    const status = container.querySelector("span");
    const btn = form.querySelector("button");

    if (data.verified) {
      status.className = "px-3 py-1 rounded-full text-sm bg-green-500/10 border border-green-500/20 text-green-300";
      status.textContent = "Tasdiqlangan";

      form.action = form.action.replace("verify-company", "unverify-company");

      btn.textContent = "To‘xtatish";
      btn.className = "px-4 py-2 rounded-lg bg-red-500/20 border border-red-500/30 text-red-400 hover:bg-red-500/30 transition";

    } else {
      status.className = "px-3 py-1 rounded-full text-sm bg-yellow-500/10 border border-yellow-500/20 text-yellow-300";
      status.textContent = "Kutilmoqda";

      form.action = form.action.replace("unverify-company", "verify-company");

      btn.textContent = "Tasdiqlash";
      btn.className = "px-4 py-2 rounded-lg bg-green-500/20 border border-green-500/30 text-green-300 hover:bg-green-500/30 transition";
    }
  }

  // =========================
  // USER BAN / UNBAN
  // =========================
  if (form.action.includes("user")) {

    const row = form.closest("tr");
    const statusCell = row.querySelectorAll("td")[4];
    const btn = form.querySelector("button");

    if (data.banned) {
      statusCell.innerHTML = `<span class="px-3 py-1 rounded-full text-xs bg-red-500/20 text-red-400">Bloklangan</span>`;
      form.action = form.action.replace("ban-user", "unban-user");
      btn.textContent = "Tiklash";
    } else {
      statusCell.innerHTML = `<span class="px-3 py-1 rounded-full text-xs bg-green-500/20 text-green-400">Faol</span>`;
      form.action = form.action.replace("unban-user", "ban-user");
      btn.textContent = "Bloklash";
    }
  }

  // =========================
  // INTERNSHIP TOGGLE
  // =========================
  if (form.action.includes("internship")) {

    const row = form.closest("tr");
    const statusCell = row.querySelectorAll("td")[5];
    const btn = form.querySelector("button");

    if (data.approved) {
      statusCell.innerHTML = `<span class="px-3 py-1 rounded-full text-xs bg-green-500/20 text-green-400">Tasdiqlangan</span>`;
      form.action = form.action.replace("approve-internship", "unapprove-internship");
      btn.textContent = "Bekor qilish";
    } else {
      statusCell.innerHTML = `<span class="px-3 py-1 rounded-full text-xs bg-yellow-500/20 text-yellow-400">Kutilmoqda</span>`;
      form.action = form.action.replace("unapprove-internship", "approve-internship");
      btn.textContent = "Tasdiqlash";
    }
  }

  showToast("Muvaffaqiyatli bajarildi ✅");
}
</script>
<script>
function showToast(message) {
  const toast = document.createElement("div");

  toast.innerText = message;
  toast.className = "fixed bottom-6 right-6 bg-white/10 backdrop-blur-xl border border-white/20 text-white px-4 py-2 rounded-lg shadow-lg";

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 2500);
}
</script>
</body>
</html>
